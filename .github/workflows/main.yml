name: Daily EHS Law Monitor

on:
  schedule:
    # 매일 아침 9시 KST (UTC 00:00)에 실행
    - cron: '0 0 * * *'
  workflow_dispatch: # 내가 원할 때 수동으로 버튼 눌러서 실행할 수 있게 해주는 마법의 주문!

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 깃허브 파일 불러오기
        uses: actions/checkout@v3

      - name: 🐍 파이썬 환경 세팅
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 필수 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3

      - name: 🚀 알리미 스크립트 실행!
        run: python email_alert.py

      - name: 💾 변경된 날짜 저장 (다음 날 비교를 위해)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add last_ehs_dates.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "업데이트: 최신 법령 날짜 기록" && git push)
